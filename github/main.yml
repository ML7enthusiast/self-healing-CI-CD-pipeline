name: CI Pipeline
on:
    push:
        branches:
            -main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build --if-present

  notify-n8n-on-failure:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: failure()
    steps:
      - name: Trigger n8n Webhook on Failure
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" https://your-n8n-webhook-url \
          -H 'Content-Type: application/json' \
          -H "x-webhook-secret:${{secrets.N8N_WEBHOOK_SECRET}}"\
          -d'{
            "run_id":"${{github.run_id}}",
            "repo":"${{github.repository}}",
            "branch":"${{github.ref_name}}",
            "commit":"${{github.sha}}",
            "actor": "${{github.actor}}"}}
